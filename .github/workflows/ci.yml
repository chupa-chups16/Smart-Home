name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore SmartHome.Api.slnx

      - name: Build
        run: dotnet build SmartHome.Api.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test SmartHome.Api.slnx --configuration Release --no-build

      - name: Vulnerability Scan
        run: |
          dotnet list SmartHome.Api/SmartHome.Api.csproj package --vulnerable --include-transitive > vuln-report.txt
          cat vuln-report.txt
          if grep -q "has the following vulnerable packages" vuln-report.txt; then
            echo "Vulnerable packages detected."
            exit 1
          fi
